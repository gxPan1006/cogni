name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Describing the underlying problem first (not just
        the solution) helps us evaluate it well.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: The use case or pain point behind the request.
      placeholder: As a user, I want to ... because ...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What you'd like to see happen. Sketches/mockups welcome.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why they fall short.
    validations:
      required: false
