<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=4" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=4" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=4" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <!-- PWA: standalone home-screen launch. iOS ignores most of the web
         manifest and needs these explicit meta tags; the manifest <link>
         itself is injected by vite-plugin-pwa at build time. -->
    <meta name="theme-color" content="#faf8f3" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- black-translucent: the web view fills the whole screen *including*
         behind the status bar, so the app's own background flows up behind the
         clock/battery with no separate bar (the immersive look). Pairs with
         viewport-fit=cover above + env(safe-area-inset-top) padding in CSS so
         content clears the status bar. Status-bar text is rendered white,
         which suits the dark theme. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Cogni" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap"
    />
    <title>Cogni</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
