<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 860" role="img" aria-labelledby="title desc">
  <title id="title">Cogni logo options</title>
  <desc id="desc">Six logo directions for Cogni.</desc>
  <rect width="1200" height="860" fill="#f6f5f1"/>
  <text x="48" y="62" fill="#111827" font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif" font-size="32" font-weight="700">Cogni logo options</text>
  <text x="48" y="94" fill="#6b7280" font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">Pick a direction by letter. These are candidates, not wired into the app yet.</text>

  <g transform="translate(48 130)">
    <rect width="340" height="300" rx="18" fill="#ffffff" stroke="#dedbd2"/>
    <text x="28" y="42" fill="#6b7280" font-family="Geist Mono, ui-monospace, monospace" font-size="13" font-weight="600">OPTION A</text>
    <text x="28" y="68" fill="#111827" font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="650">Orbit C</text>
    <g transform="translate(28 104)">
      <rect width="96" height="96" rx="27" fill="#111827"/>
      <path d="M64.5 27a27 27 0 1 0 0 42" fill="none" stroke="#f8fafc" stroke-width="10.5" stroke-linecap="round"/>
      <path d="M63 28.5 46.5 48 64.5 67.5" fill="none" stroke="#38bdf8" stroke-width="5.25" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="64.5" cy="27" r="9" fill="#2dd4bf"/>
      <circle cx="46.5" cy="48" r="6" fill="#f8fafc"/>
      <circle cx="64.5" cy="69" r="9" fill="#f59e0b"/>
    </g>
    <text x="148" y="162" fill="#111827" font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="650">cogni</text>
    <text x="28" y="244" fill="#4b5563" font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif" font-size="14">Most app-icon friendly. Clear C + routing nodes.</text>
  </g>

  <g transform="translate(430 130)">
    <rect width="340" height="300" rx="18" fill="#ffffff" stroke="#dedbd2"/>
    <text x="28" y="42" fill="#6b7280" font-family="Geist Mono, ui-monospace, monospace" font-size="13" font-weight="600">OPTION B</text>
    <text x="28" y="68" fill="#111827" font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="650">Agent Loop</text>
    <defs>
      <linearGradient id="board-loop" x1="28" y1="118" x2="124" y2="198" gradientUnits="userSpaceOnUse">
        <stop offset="0" stop-color="#2563eb"/>
        <stop offset="1" stop-color="#10b981"/>
      </linearGradient>
    </defs>
    <g transform="translate(28 104)">
      <path d="M81 30c-19.5-19.5-52.5-4.5-52.5 22.5S61.5 94.5 81 75l18-18c12-12 4.5-31.5-12-31.5-7.5 0-15 3-21 9L33 67.5" fill="none" stroke="url(#board-loop)" stroke-width="10.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="34.5" cy="67.5" r="7.5" fill="#111827"/>
      <circle cx="87" cy="30" r="9" fill="#2563eb"/>
      <circle cx="99" cy="57" r="6" fill="#10b981"/>
    </g>
    <text x="148" y="162" fill="#111827" font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="650">cogni</text>
    <text x="28" y="244" fill="#4b5563" font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif" font-size="14">Friendlier and more fluid. Less literal C.</text>
  </g>

  <g transform="translate(812 130)">
    <rect width="340" height="300" rx="18" fill="#ffffff" stroke="#dedbd2"/>
    <text x="28" y="42" fill="#6b7280" font-family="Geist Mono, ui-monospace, monospace" font-size="13" font-weight="600">OPTION C</text>
    <text x="28" y="68" fill="#111827" font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="650">Prompt</text>
    <g transform="translate(28 104)">
      <rect width="96" height="96" rx="21" fill="#0f172a"/>
      <path d="M27 34.5 46.5 48 27 61.5" fill="none" stroke="#f8fafc" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M51 63h19.5" fill="none" stroke="#22c55e" stroke-width="7.5" stroke-linecap="round"/>
      <circle cx="70.5" cy="34.5" r="7.5" fill="#38bdf8"/>
      <path d="M70.5 42v13.5" fill="none" stroke="#38bdf8" stroke-width="4.5" stroke-linecap="round"/>
    </g>
    <text x="148" y="162" fill="#111827" font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="650">cogni</text>
    <text x="28" y="244" fill="#4b5563" font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif" font-size="14">Developer-tool feeling. Strong for Codex-like usage.</text>
  </g>

  <g transform="translate(48 478)">
    <rect width="340" height="300" rx="18" fill="#ffffff" stroke="#dedbd2"/>
    <text x="28" y="42" fill="#6b7280" font-family="Geist Mono, ui-monospace, monospace" font-size="13" font-weight="600">OPTION D</text>
    <text x="28" y="68" fill="#111827" font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="650">Spine</text>
    <g transform="translate(28 104)">
      <rect width="96" height="96" rx="27" fill="#f8fafc"/>
      <rect x="1.5" y="1.5" width="93" height="93" rx="25.5" fill="none" stroke="#d1d5db" stroke-width="3"/>
      <path d="M48 24v48" fill="none" stroke="#111827" stroke-width="7.5" stroke-linecap="round"/>
      <path d="M48 36c13.5 0 22.5 7.5 22.5 18 0 12-9 18-22.5 18-15 0-24-9-24-24 0-13.5 9-24 24-24" fill="none" stroke="#111827" stroke-width="7.5" stroke-linecap="round"/>
      <circle cx="48" cy="24" r="7.5" fill="#2563eb"/>
      <circle cx="70.5" cy="54" r="7.5" fill="#f97316"/>
      <circle cx="48" cy="72" r="7.5" fill="#10b981"/>
    </g>
    <text x="148" y="162" fill="#111827" font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="650">cogni</text>
    <text x="28" y="244" fill="#4b5563" font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif" font-size="14">Matches SP-1 spine idea. More product-system than cute.</text>
  </g>

  <g transform="translate(430 478)">
    <rect width="340" height="300" rx="18" fill="#ffffff" stroke="#dedbd2"/>
    <text x="28" y="42" fill="#6b7280" font-family="Geist Mono, ui-monospace, monospace" font-size="13" font-weight="600">OPTION E</text>
    <text x="28" y="68" fill="#111827" font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="650">Cloud / Local</text>
    <g transform="translate(28 104)">
      <rect width="96" height="96" rx="24" fill="#111827"/>
      <rect x="24" y="22.5" width="48" height="27" rx="10.5" fill="#f8fafc"/>
      <rect x="24" y="52.5" width="48" height="27" rx="10.5" fill="#f8fafc"/>
      <path d="M48 49.5v3" fill="none" stroke="#10b981" stroke-width="7.5" stroke-linecap="round"/>
      <circle cx="36" cy="36" r="4.5" fill="#2563eb"/>
      <circle cx="60" cy="66" r="4.5" fill="#f97316"/>
    </g>
    <text x="148" y="162" fill="#111827" font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="650">cogni</text>
    <text x="28" y="244" fill="#4b5563" font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif" font-size="14">Literal architecture: cloud control + local runner.</text>
  </g>

  <g transform="translate(812 478)">
    <rect width="340" height="300" rx="18" fill="#ffffff" stroke="#dedbd2"/>
    <text x="28" y="42" fill="#6b7280" font-family="Geist Mono, ui-monospace, monospace" font-size="13" font-weight="600">OPTION F</text>
    <text x="28" y="68" fill="#111827" font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="650">Signal C</text>
    <g transform="translate(28 104)">
      <rect width="96" height="96" rx="27" fill="#06261f"/>
      <path d="M67.5 27a30 30 0 1 0 0 42" fill="none" stroke="#ecfdf5" stroke-width="10.5" stroke-linecap="round"/>
      <path d="M43.5 33c10.5 3 16.5 9 18 16.5-1.5 7.5-7.5 13.5-18 16.5" fill="none" stroke="#34d399" stroke-width="6" stroke-linecap="round"/>
      <circle cx="67.5" cy="27" r="8.25" fill="#67e8f9"/>
      <circle cx="67.5" cy="69" r="8.25" fill="#fbbf24"/>
    </g>
    <text x="148" y="162" fill="#111827" font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="650">cogni</text>
    <text x="28" y="244" fill="#4b5563" font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif" font-size="14">More distinctive, slightly security/network flavored.</text>
  </g>
</svg>
