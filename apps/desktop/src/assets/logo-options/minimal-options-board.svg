<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Cogni minimal logo options</title>
  <desc id="desc">Six minimalist logo directions for Cogni.</desc>
  <rect width="1200" height="760" fill="#f7f7f4"/>
  <text x="48" y="62" fill="#111827" font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif" font-size="32" font-weight="700">Cogni minimal logo options</text>
  <text x="48" y="94" fill="#6b7280" font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">Cleaner, quieter, mostly single-color. Pick M1-M6.</text>

  <g transform="translate(48 132)">
    <rect width="340" height="236" rx="16" fill="#ffffff" stroke="#e4e2dc"/>
    <text x="28" y="40" fill="#6b7280" font-family="Geist Mono, ui-monospace, monospace" font-size="13" font-weight="600">M1</text>
    <text x="28" y="68" fill="#111827" font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="650">Wordmark only</text>
    <text x="28" y="140" fill="#111827" font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif" font-size="44" font-weight="650">cogn</text>
    <text x="146" y="140" fill="#111827" font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif" font-size="44" font-weight="650">i</text>
    <circle cx="154" cy="104" r="5" fill="#14b8a6"/>
    <text x="28" y="194" fill="#4b5563" font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif" font-size="14">Cleanest. Best if the app icon can be separate.</text>
  </g>

  <g transform="translate(430 132)">
    <rect width="340" height="236" rx="16" fill="#ffffff" stroke="#e4e2dc"/>
    <text x="28" y="40" fill="#6b7280" font-family="Geist Mono, ui-monospace, monospace" font-size="13" font-weight="600">M2</text>
    <text x="28" y="68" fill="#111827" font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="650">Open C</text>
    <path d="M72 102a24 24 0 1 0 0 46" fill="none" stroke="#111827" stroke-width="7" stroke-linecap="round"/>
    <circle cx="72" cy="102" r="5" fill="#14b8a6"/>
    <text x="116" y="142" fill="#111827" font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif" font-size="42" font-weight="650">cogni</text>
    <text x="28" y="194" fill="#4b5563" font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif" font-size="14">Simple icon + wordmark, still recognizably Cogni.</text>
  </g>

  <g transform="translate(812 132)">
    <rect width="340" height="236" rx="16" fill="#ffffff" stroke="#e4e2dc"/>
    <text x="28" y="40" fill="#6b7280" font-family="Geist Mono, ui-monospace, monospace" font-size="13" font-weight="600">M3</text>
    <text x="28" y="68" fill="#111827" font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="650">C Tile</text>
    <rect x="28" y="94" width="58" height="58" rx="14" fill="#111827"/>
    <path d="M64 108a16 16 0 1 0 0 31" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
    <circle cx="64" cy="108" r="4" fill="#14b8a6"/>
    <text x="116" y="142" fill="#111827" font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif" font-size="42" font-weight="650">cogni</text>
    <text x="28" y="194" fill="#4b5563" font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif" font-size="14">Best app-icon candidate while staying minimal.</text>
  </g>

  <g transform="translate(48 422)">
    <rect width="340" height="236" rx="16" fill="#ffffff" stroke="#e4e2dc"/>
    <text x="28" y="40" fill="#6b7280" font-family="Geist Mono, ui-monospace, monospace" font-size="13" font-weight="600">M4</text>
    <text x="28" y="68" fill="#111827" font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="650">Route</text>
    <path d="M38 144 72 108" fill="none" stroke="#111827" stroke-width="6" stroke-linecap="round"/>
    <circle cx="38" cy="144" r="6" fill="#111827"/>
    <circle cx="72" cy="108" r="6" fill="#14b8a6"/>
    <text x="116" y="142" fill="#111827" font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif" font-size="42" font-weight="650">cogni</text>
    <text x="28" y="194" fill="#4b5563" font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif" font-size="14">Abstract cloud-to-local routing, very quiet.</text>
  </g>

  <g transform="translate(430 422)">
    <rect width="340" height="236" rx="16" fill="#ffffff" stroke="#e4e2dc"/>
    <text x="28" y="40" fill="#6b7280" font-family="Geist Mono, ui-monospace, monospace" font-size="13" font-weight="600">M5</text>
    <text x="28" y="68" fill="#111827" font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="650">Prompt</text>
    <path d="M34 110 52 126 34 142" fill="none" stroke="#111827" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M62 142h22" fill="none" stroke="#14b8a6" stroke-width="6.5" stroke-linecap="round"/>
    <text x="116" y="142" fill="#111827" font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif" font-size="42" font-weight="650">cogni</text>
    <text x="28" y="194" fill="#4b5563" font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif" font-size="14">Most developer-tool-like, least generic.</text>
  </g>

  <g transform="translate(812 422)">
    <rect width="340" height="236" rx="16" fill="#ffffff" stroke="#e4e2dc"/>
    <text x="28" y="40" fill="#6b7280" font-family="Geist Mono, ui-monospace, monospace" font-size="13" font-weight="600">M6</text>
    <text x="28" y="68" fill="#111827" font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="650">Ligature</text>
    <path d="M52 146a20 20 0 1 1 0-40h22a20 20 0 1 1 0 40H52Z" fill="none" stroke="#111827" stroke-width="6"/>
    <circle cx="74" cy="126" r="5" fill="#14b8a6"/>
    <text x="116" y="142" fill="#111827" font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif" font-size="42" font-weight="650">cogni</text>
    <text x="28" y="194" fill="#4b5563" font-family="Geist, Inter, ui-sans-serif, system-ui, sans-serif" font-size="14">More logo-ish, but needs refinement if chosen.</text>
  </g>
</svg>
